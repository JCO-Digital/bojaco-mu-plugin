name: Bojaco MU Plugin Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP with tools
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.2
          tools: composer:v2
      - name: Build Binaries
        run: make
      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "dist/*"
